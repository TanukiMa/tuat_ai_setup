name: Build and release setup_ai.exe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build setup_ai.exe
        shell: pwsh
        run: cargo build --release --locked

      - name: Collect setup_ai.exe
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $workspace = (Get-Location).Path
          $outputDir = Join-Path $workspace 'dist'
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $sourcePath = Join-Path $workspace 'target\release\setup_ai.exe'
          $targetPath = Join-Path $outputDir 'setup_ai.exe'

          if (-not (Test-Path $sourcePath)) {
            throw "setup_ai.exe was not generated: $sourcePath"
          }

          Copy-Item -LiteralPath $sourcePath -Destination $targetPath -Force

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $tag = "setup-ai-${{ github.run_id }}-${{ github.run_attempt }}"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=setup_ai $tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create release and upload setup_ai.exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          files: dist/setup_ai.exe
